name: 🔥 AdwaSport Advanced Processor

on:
  workflow_run:
    workflows:
      - "Merge CricHD Playlists"   # from Chdmarge.yml
      - "Merge M3U"                # from M.yml
      - "Update Playlist"          # from Pxl.yml
      - "Update TVPass Playlist"   # from tvpass.yml
    types:
      - completed
  schedule:
    # Runs every hour at :30 – ensures fresh streams even if scrapers miss
    - cron: '30 * * * *'
  workflow_dispatch:               # Manual trigger for testing

jobs:
  process:
    runs-on: ubuntu-latest
    # Only run if triggering workflow succeeded, OR if triggered manually/scheduled
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🎬 Install FFmpeg (for deep stream analysis)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 📦 Install Python dependencies
        run: pip install requests

      - name: 🚀 Run advanced sports processor
        run: python process_sports.py

      - name: 📊 Verify output files exist
        run: |
          if [ ! -f adwa_sports.m3u ]; then
            echo "❌ adwa_sports.m3u not generated!"
            exit 1
          fi
          if [ ! -f categorized_streams.json ]; then
            echo "⚠️ categorized_streams.json not generated (non‑fatal)"
          fi

      - name: 💾 Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add adwa_sports.m3u categorized_streams.json channels.json matches.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "🔄 Auto-update streams & categories [skip ci]"
            git push
          fi